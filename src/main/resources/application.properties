spring.application.name=booking

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cinema_booking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

app.jwt.secret=${JWT_SECRET:cinema-booking-secret-key-must-be-at-least-32-bytes-long}
app.cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}
management.endpoints.web.exposure.include=health,env